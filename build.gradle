plugins {
    id 'java'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Only Jackson. No aws-lambda-* dependency: the app is a plain HTTP server, and the
    // Lambda Web Adapter (added in the Dockerfile) bridges Lambda's Runtime API to it.
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.2'
}

// Stage runtime dependencies next to the jar so `java -jar app.jar` can find them via Class-Path.
tasks.register('copyDeps', Copy) {
    from configurations.runtimeClasspath
    into "$buildDir/dependency"
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.mgaray.server.Server',
            'Class-Path': configurations.runtimeClasspath.collect { "lib/${it.name}" }.join(' ')
        )
    }
}

tasks.named('build') {
    dependsOn 'copyDeps'
}
